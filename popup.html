<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT Batch Tools</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>ChatGPT Batch Tools</h1>

    <div class="mode-switch" role="tablist" aria-label="Mode">
      <button id="mode-delete" class="mode-btn active" type="button" role="tab" aria-selected="true">Delete</button>
      <button id="mode-move" class="mode-btn" type="button" role="tab" aria-selected="false">Move to Project</button>
      <button id="mode-context" class="mode-btn" type="button" role="tab" aria-selected="false">Build Context</button>
    </div>

    <div id="status-bar" class="status-bar hidden" role="status" aria-live="polite"></div>

    <div class="toolbar">
      <label class="select-all-label">
        <input type="checkbox" id="select-all"> Select All
      </label>
      <div class="toolbar-actions">
        <button id="btn-load-all" class="btn-secondary" type="button">Load All</button>
        <button id="btn-primary" class="btn-primary-action btn-danger" type="button" disabled>Delete Selected</button>
      </div>
    </div>

    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Filter conversations...">
    </div>

    <label class="filter-toggle">
      <input type="checkbox" id="hide-in-project"> Hide conversations already in a project
    </label>

    <div class="preview-style-row">
      <span class="preview-style-label">Preview on click:</span>
      <div class="preview-style-switch" role="tablist" aria-label="Preview style">
        <button id="preview-inline" class="preview-style-btn active" type="button">Inline</button>
        <button id="preview-modal-btn" class="preview-style-btn" type="button">Popup</button>
      </div>
    </div>

    <div id="conversation-list" class="conversation-list">
      <div class="loading">Loading conversations...</div>
    </div>

    <div id="total-info" class="total-info"></div>
  </div>

  <div id="confirm-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-message">
    <div class="modal-content">
      <p id="confirm-message"></p>
      <div class="modal-actions">
        <button id="btn-confirm-yes" class="btn-primary-action btn-danger" type="button">Confirm Delete</button>
        <button id="btn-confirm-no" class="btn-cancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <div id="project-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="project-modal-title">
    <div class="modal-content modal-content-wide">
      <p id="project-modal-title" class="modal-title"></p>

      <input type="text" id="project-search" class="project-search" placeholder="Search projects...">

      <div id="project-list" class="project-list">
        <div class="loading">Loading projects...</div>
      </div>

      <div class="new-project-row">
        <button id="btn-new-project" class="new-project-toggle" type="button">+ New project</button>
        <div id="new-project-form" class="new-project-form hidden">
          <input type="text" id="new-project-name" placeholder="New project name">
          <div class="memory-scope-options">
            <label class="scope-option">
              <input type="radio" name="memory-scope" value="global" checked>
              Shared memory
            </label>
            <label class="scope-option">
              <input type="radio" name="memory-scope" value="project_v2">
              Project-only context
            </label>
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button id="btn-project-confirm" class="btn-primary-action btn-move" type="button" disabled>Move</button>
        <button id="btn-project-cancel" class="btn-cancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <div id="preview-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="preview-modal-title">
    <div class="modal-content modal-content-wide">
      <p id="preview-modal-title" class="modal-title"></p>
      <div id="preview-modal-body" class="preview-body"></div>
      <div class="modal-actions">
        <button id="btn-preview-open" class="btn-secondary" type="button">Open full chat ↗</button>
        <button id="btn-preview-close" class="btn-cancel" type="button">Close</button>
      </div>
    </div>
  </div>

  <div id="context-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="context-modal-title">
    <div class="modal-content modal-content-wide context-modal-content">
      <div class="context-header">
        <p id="context-modal-title" class="modal-title">Build Context</p>
        <div class="context-expand-controls">
          <button id="btn-context-select-all" class="btn-secondary btn-sm" type="button">Select All</button>
          <button id="btn-context-deselect-all" class="btn-secondary btn-sm" type="button">Deselect All</button>
        </div>
      </div>

      <div id="context-conv-list" class="context-conv-list"></div>

      <div class="context-options">
        <div class="context-option-row">
          <span class="context-option-label">Format:</span>
          <div class="context-option-buttons" id="context-format-group" role="group" aria-label="Output format">
            <button class="context-opt-btn active" data-value="markdown" type="button">Markdown</button>
            <button class="context-opt-btn" data-value="xml" type="button">XML</button>
            <button class="context-opt-btn" data-value="plain" type="button">Plain</button>
          </div>
        </div>
        <div class="context-option-row">
          <span class="context-option-label">Template:</span>
          <div class="context-option-buttons" id="context-template-group" role="group" aria-label="Prompt template">
            <button class="context-opt-btn active" data-value="none" type="button">None</button>
            <button class="context-opt-btn" data-value="summarize" type="button">Summarize</button>
            <button class="context-opt-btn" data-value="outline" type="button">Outline</button>
            <button class="context-opt-btn" data-value="reorganize" type="button">Reorganize</button>
          </div>
        </div>
      </div>

      <div id="context-status" class="status-bar context-status hidden" role="status" aria-live="polite"></div>

      <div class="modal-actions">
        <button id="btn-context-send" class="btn-primary-action btn-move" type="button">Send to New Chat</button>
        <button id="btn-context-copy" class="btn-primary-action btn-context" type="button">Copy</button>
        <button id="btn-context-close" class="btn-cancel" type="button">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
